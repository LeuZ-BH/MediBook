<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Book Appointment</title>
    <link rel="icon"type="image/jpeg"th:href="@{/static/image/logo.jpg}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link th:href="@{/static/css/style.css}" rel="stylesheet" />
</head>
<body>
<div class="app-shell">

    <nav class="topbar navbar navbar-expand-lg navbar-light">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold d-flex align-items-center gap-2"th:href="@{/doctor/dashboard}">

                <img th:src="@{/static/image/logo.jpg}"
                    alt="MediBook"
                    width="32"
                    height="32">

                <span>MediBook</span>

            </a>
            <div class="ms-auto d-flex gap-2 align-items-center">
                <span class="text-muted small" th:text="${session.userName}"></span>
                <a class="btn btn-outline-danger btn-sm" th:href="@{/logout}">Logout</a>
            </div>
        </div>
    </nav>

    <div class="main-area d-flex">
        <aside class="sidebar">
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link" th:href="@{/patient/dashboard}">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/patient/search}">Search Doctors</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/patient/my-appointments}">My Appointments</a></li>
            </ul>
        </aside>

        <main class="content flex-grow-1 p-4">
            <h3 class="mb-3">Book Appointment</h3>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

            <form th:action="@{/patient/book}" method="post" class="card card-body border-0 shadow-sm">
                <input type="hidden" name="slotId" th:value="${slotId}" />

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Age</label>
                        <input type="number"
                            name="patientAge"
                            class="form-control"
                            required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Gender</label>
                        <select name="patientGender"
                                class="form-select"
                                required>
                            <option value="">Select Gender</option>
                            <option>Male</option>
                            <option>Female</option>
                            <option>Other</option>
                        </select>
                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Blood Group</label>
                        <select name="bloodGroup"
                                class="form-select"
                                required>
                            <option value="">Select Blood Group</option>
                            <option>A+</option>
                            <option>A-</option>
                            <option>B+</option>
                            <option>B-</option>
                            <option>AB+</option>
                            <option>AB-</option>
                            <option>O+</option>
                            <option>O-</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Weight (kg)</label>
                        <input type="number"
                            step="0.1"
                            name="weight"
                            class="form-control"
                            required>
                    </div>

                </div>

                <div class="mb-3">
                    <label class="form-label">Reason</label>
                    <textarea name="reason"
                            class="form-control"
                            rows="3"
                            required></textarea>
                </div>

                <button type="submit" class="btn btn-primary w-100">Book This Slot</button>
            </form>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
