<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Patient Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link th:href="@{/static/css/style.css}" rel="stylesheet" />
</head>
<body>
<div class="app-shell">

    <nav class="topbar navbar navbar-expand-lg navbar-light">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" th:href="@{/patient/dashboard}">MediBook</a>
            <div class="ms-auto d-flex gap-2 align-items-center">
                <span class="text-muted small" th:text="${session.userName}"></span>
                <a class="btn btn-outline-danger btn-sm" th:href="@{/logout}">Logout</a>
            </div>
        </div>
    </nav>

    <div class="main-area d-flex">
        <aside class="sidebar">
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link active" th:href="@{/patient/dashboard}">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/patient/search}">Search Doctors</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/patient/my-appointments}">My Appointments</a></li>
            </ul>
        </aside>

        <main class="content flex-grow-1 p-4">
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

            <h3 class="mb-3">Welcome, <span th:text="${session.userName}"></span></h3>

            <div class="row g-3">
                <div class="col-12 col-md-4">
                    <div class="stat-card">
                        <div class="stat-label">Upcoming Appointments</div>
                        <div class="stat-value" th:text="${upcomingAppointments}"></div>
                    </div>
                </div>
                <div class="col-12 col-md-4">
                    <div class="stat-card">
                        <div class="stat-label">Doctors Available</div>
                        <div class="stat-value" th:text="${doctorsAvailable}"></div>
                    </div>
                </div>
                <div class="col-12 col-md-4">
                    <div class="stat-card">
                        <div class="stat-label">Specializations</div>
                        <div class="stat-value" th:text="${specializationsCount}"></div>
                    </div>
                </div>
            </div>

            <div class="mt-4">
                <h5 class="mb-2">Quick Links</h5>
                <div class="d-flex flex-wrap gap-2">
                    <a th:href="@{/patient/search}" class="btn btn-primary">Search Doctors</a>
                    <a th:href="@{/patient/my-appointments}" class="btn btn-outline-primary">My Appointments</a>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
