<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Search Doctors</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link th:href="@{/static/css/style.css}" rel="stylesheet" />
</head>
<body>
<div class="app-shell">

    <nav class="topbar navbar navbar-expand-lg navbar-light">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" th:href="@{/patient/dashboard}">MediBook</a>
            <div class="ms-auto d-flex gap-2 align-items-center">
                <span class="text-muted small" th:text="${session.userName}"></span>
                <a class="btn btn-outline-danger btn-sm" th:href="@{/logout}">Logout</a>
            </div>
        </div>
    </nav>

    <div class="main-area d-flex">
        <aside class="sidebar">
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link" th:href="@{/patient/dashboard}">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/patient/search}">Search Doctors</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/patient/my-appointments}">My Appointments</a></li>
            </ul>
        </aside>

        <main class="content flex-grow-1 p-4">

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

            <h3 class="mb-3">Search Doctors</h3>

            <form th:action="@{/patient/search}" method="get" class="card card-body border-0 shadow-sm mb-4">
                <div class="row g-3 align-items-end">
                    <div class="col-12 col-md-5">
                        <label class="form-label">Specialization</label>
                        <select name="spec" class="form-select">
                            <option value="" th:selected="${selectedSpec == null}">All</option>
                            <option th:each="s : ${specializations}" th:value="${s.specId}" th:text="${s.name}"
                                    th:selected="${selectedSpec != null and selectedSpec == s.specId}"></option>
                        </select>
                    </div>
                    <div class="col-12 col-md-5">
                        <label class="form-label">Doctor Name</label>
                        <input type="text" name="name" class="form-control" placeholder="Enter name" th:value="${searchName}" />
                    </div>
                    <div class="col-12 col-md-2">
                        <button class="btn btn-primary w-100" type="submit">Search</button>
                    </div>
                </div>
            </form>

            <div class="row g-3">
                <div th:if="${#lists.isEmpty(doctors)}" class="col-12">
                    <div class="alert alert-info">No doctors found.</div>
                </div>

                <div th:each="d : ${doctors}" class="col-12 col-md-6 col-lg-4">
                    <div class="doctor-card card shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title mb-2" th:text="${d.user.name}">Doctor Name</h5>
                            <div class="text-muted mb-2" th:text="${d.specialization.name}">Specialization</div>
                            <div class="mb-2">
                                <span class="fw-semibold">Experience:</span>
                                <span th:text="${d.experienceYears} + ' years'">0 years</span>
                            </div>
                            <p class="mb-3 text-truncate" th:text="${d.bio}">Bio</p>

                            <a class="btn btn-primary w-100"th:href="@{/patient/doctor/{doctorId}/slots(doctorId=${d.doctorId})}">View Slots</a>
                        </div>
                    </div>
                </div>
            </div>

            
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
