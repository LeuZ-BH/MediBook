<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Available Slots - MediBook</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="row justify-content-center">
        <div class="col-lg-10">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold mb-0">
                    Available Slots
                </h2>

                <a th:href="@{/patient/search}"
                   class="btn btn-outline-secondary">
                    Back to Doctors
                </a>
            </div>

            <div class="card shadow-sm border-0">

                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">
                        Select a Time Slot
                    </h5>
                </div>

                <div class="card-body">

                    <div th:if="${#lists.isEmpty(slots)}"
                         class="alert alert-warning">

                        No available slots found for this doctor.

                    </div>

                    <div th:unless="${#lists.isEmpty(slots)}">

                        <table class="table table-hover align-middle">

                            <thead class="table-light">
                            <tr>
                                <th>Slot ID</th>
                                <th>Date</th>
                                <th>Start Time</th>
                                <th>End Time</th>
                                <th class="text-center">Action</th>
                            </tr>
                            </thead>

                            <tbody>

                            <tr th:each="s : ${slots}">

                                <td th:text="${s.slotId}"></td>

                                <td th:text="${s.slotDate}">
                                    2026-05-30
                                </td>

                                <td th:text="${s.startTime}">
                                    10:00
                                </td>

                                <td th:text="${s.endTime}">
                                    10:30
                                </td>

                                <td class="text-center">

                                    <a class="btn btn-success btn-sm"
                                       th:href="@{/patient/book/{slotId}(slotId=${s.slotId})}">
                                        Book Slot
                                    </a>

                                </td>

                            </tr>

                            </tbody>

                        </table>

                    </div>

                </div>

            </div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
