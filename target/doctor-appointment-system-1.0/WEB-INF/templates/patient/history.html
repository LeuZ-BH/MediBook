<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Appointment History</title>
    <link rel="icon"type="image/jpeg"th:href="@{/static/image/logo.jpg}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link th:href="@{/static/css/common.css}" rel="stylesheet">
    <link th:href="@{/static/css/patient.css}" rel="stylesheet">

    <style>
        body{
            background:#f5f7fb;
        }

        .history-card{
            border:none;
            border-radius:15px;
            box-shadow:0 2px 12px rgba(0,0,0,0.08);
        }

        .page-title{
            font-weight:700;
            color:#2563eb;
        }

        .badge-pending{
            background:#ffc107;
            color:black;
        }

        .badge-confirmed{
            background:#0d6efd;
        }

        .badge-completed{
            background:#198754;
        }

        .badge-cancelled{
            background:#dc3545;
        }
    </style>
</head>



<body>
<div class="app-shell">

    <nav class="topbar navbar navbar-expand-lg navbar-light">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold d-flex align-items-center gap-2"th:href="@{/doctor/dashboard}">

                <img th:src="@{/static/image/logo.jpg}"
                    alt="MediBook"
                    width="32"
                    height="32">

                <span>MediBook</span>

            </a>
            <div class="ms-auto d-flex gap-2 align-items-center">
                <span class="text-muted small" th:text="${session.userName}"></span>
                <a class="btn btn-outline-danger btn-sm" th:href="@{/logout}">Logout</a>
            </div>
        </div>
    </nav>

    <div class="main-area d-flex">
        <aside class="sidebar">
            <ul class="nav flex-column">

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/patient/dashboard}">
                        <i class="bi bi-speedometer2 me-2"></i>
                        Dashboard
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/patient/search}">
                        <i class="bi bi-search me-2"></i>
                        Search Doctors
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/patient/my-appointments}">
                        <i class="bi bi-calendar-check me-2"></i>
                        My Appointments
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/patient/history}">
                        <i class="bi bi-clock-history me-2"></i>
                        Appointment History
                    </a>
                </li>

            </ul>
        </aside>

    <main class="content flex-grow-1 p-4">


    <div class="card history-card">

        <div class="card-body">

            <div class="row mb-3">

                <div class="col-md-6">
                    <input type="text"
                           id="searchInput"
                           class="form-control"
                           placeholder="Search doctor or reason...">
                </div>

                <div class="col-md-3">
                    <select id="statusFilter"
                            class="form-select">
                        <option value="">All Status</option>
                        <option value="PENDING">Pending</option>
                        <option value="CONFIRMED">Confirmed</option>
                        <option value="COMPLETED">Completed</option>
                        <option value="CANCELLED">Cancelled</option>
                    </select>
                </div>

            </div>


            <div class="table-responsive">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 class="mb-0">Appointment History</h4>

                    <span class="badge bg-secondary fs-6"
                        th:text="'Total Appointments: ' + ${appointments.size()}">
                    </span>
                </div>
                <table class="table table-hover align-middle"
                       id="historyTable">

                    <thead class="table-light">
                        <tr>
                            <th>Doctor</th>
                            <th>Specialization</th>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Reason</th>
                            <th>Status</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="appt : ${appointments}">

                            <td th:text="${appt.slot.doctor.user.name}"></td>

                            <td th:text="${appt.slot.doctor.specialization.name}"></td>

                            <td th:text="${appt.slot.slotDate}"></td>

                            <td>
                                <span th:text="${appt.slot.startTime}"></span>
                                -
                                <span th:text="${appt.slot.endTime}"></span>
                            </td>

                            <td th:text="${appt.reason}"></td>

                            <!--STATUS-->
                            <td>
                                <span th:if="${appt.status.name()=='PENDING'}"
                                    class="badge bg-warning">
                                    Pending
                                </span>

                                <span th:if="${appt.status.name()=='CONFIRMED'}"
                                    class="badge bg-primary">
                                    Confirmed
                                </span>

                                <span th:if="${appt.status.name()=='COMPLETED'}"
                                    class="badge bg-success">
                                    Completed
                                </span>

                                <span th:if="${appt.status.name()=='CANCELLED'}"
                                    class="badge bg-danger">
                                    Cancelled
                                </span>
                            </td>

                        </tr>
                        </tbody>

                </table>

            </div>

        </div>
    </main>
    </div>
</div>

</div>

 <script>
    

const searchInput =
document.getElementById("searchInput");

const statusFilter =
document.getElementById("statusFilter");

function filterTable(){

    let search =
    searchInput.value.toLowerCase();

    let status =
    statusFilter.value;

    let rows =
    document.querySelectorAll(
    "#historyTable tbody tr");

    rows.forEach(row=>{

        let text =
        row.innerText.toLowerCase();

        let rowStatus =
        row.cells[3].innerText.trim();

        let searchMatch =
        text.includes(search);

        let statusMatch =
        status === "" ||
        rowStatus === status;

        row.style.display =
        searchMatch && statusMatch
        ? ""
        : "none";

    });
}

searchInput.addEventListener(
"keyup",
filterTable);

statusFilter.addEventListener(
"change",
filterTable);

</script>

</body>
</html>
