<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Appointments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link th:href="@{/static/css/style.css}" rel="stylesheet" />
</head>
<body>
<div class="app-shell">

    <nav class="topbar navbar navbar-expand-lg navbar-light">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" th:href="@{/patient/dashboard}">MediBook</a>
            <div class="ms-auto d-flex gap-2 align-items-center">
                <span class="text-muted small" th:text="${session.userName}"></span>
                <a class="btn btn-outline-danger btn-sm" th:href="@{/logout}">Logout</a>
            </div>
        </div>
    </nav>

    <div class="main-area d-flex">
        <aside class="sidebar">
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link" th:href="@{/patient/dashboard}">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/patient/search}">Search Doctors</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/patient/my-appointments}">My Appointments</a></li>
            </ul>
        </aside>

        <main class="content flex-grow-1 p-4">
            <h3 class="mb-3">My Appointments</h3>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

            <div class="table-responsive">
                <table class="table table-hover bg-white shadow-sm" style="border-radius:10px; overflow:hidden;">
                    <thead class="table-light">
                    <tr>
                        <th>Doctor</th>
                        <th>Specialization</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Reason</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                    </thead>
                    <tr th:each="a : ${appointments}">
                        <td th:text="${a.slot.doctor.user.name}">Doctor</td>
                        <td th:text="${a.slot.doctor.specialization.name}">Specialization</td>
                        <td th:text="${a.slot.slotDate}">Date</td>
                        <td th:text="${a.slot.startTime}">Time</td>
                        <td th:text="${a.reason}">Reason</td>
                        <td th:text="${a.status}">Status</td>
                        <td>

                            <form th:if="${a.status.name() == 'PENDING' || a.status.name() == 'CONFIRMED'}"
                                th:action="@{/patient/cancel/{id}(id=${a.appointmentId})}"
                                method="post"
                                style="display:inline;">

                                <button type="submit"
                                        class="btn btn-danger btn-sm"
                                        onclick="return confirm('Cancel this appointment?');">
                                    Cancel
                                </button>

                            </form>

                            <span th:if="${a.status.name() == 'COMPLETED'}"
                                class="badge bg-success">
                                Completed
                            </span>

                            <span th:if="${a.status.name() == 'CANCELLED'}"
                                class="badge bg-danger">
                                Cancelled
                            </span>

                        </td>
                    </tr>
                        <tr th:if="${appointments == null or appointments.isEmpty()}">
                            <td colspan="7" class="text-center text-muted">No appointments found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
