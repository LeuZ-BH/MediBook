<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Manage Slots</title>
    <link rel="icon"type="image/jpeg"th:href="@{/static/image/logo.jpg}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link th:href="@{/static/css/style.css}" rel="stylesheet" />
</head>
<body>
<div class="app-shell">
    <nav class="topbar navbar navbar-expand-lg navbar-light">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold d-flex align-items-center gap-2"th:href="@{/doctor/dashboard}">

                <img th:src="@{/static/image/logo.jpg}"
                    alt="MediBook"
                    width="32"
                    height="32">

                <span>MediBook</span>

            </a>
            <div class="ms-auto d-flex gap-2 align-items-center">
                <span class="text-muted small" th:text="${session.userName}"></span>
                <a class="btn btn-outline-danger btn-sm" th:href="@{/logout}">Logout</a>
            </div>
        </div>
    </nav>

    <div class="main-area d-flex">
        <aside class="sidebar">
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link" th:href="@{/doctor/dashboard}">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/doctor/slots}">Manage Slots</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/doctor/appointments}">My Appointments</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/doctor/history}">History</a>
</li>
            </ul>
        </aside>

        <main class="content flex-grow-1 p-4">
            <h3 class="mb-3">Manage Slots</h3>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

            <div class="card shadow-sm border-0 p-4 mb-4">
                <h5 class="mb-3">Add New Slot</h5>
                <form th:action="@{/doctor/slots/add}" method="post">
                    <div class="row g-3">
                        <div class="col-12 col-md-4">
                            <label class="form-label">Date</label>
                            <input type="date" name="slotDate" class="form-control" required />
                        </div>
                        <div class="col-12 col-md-3">
                            <label class="form-label">Start</label>
                            <input type="time" name="startTime" class="form-control" required />
                        </div>
                        <div class="col-12 col-md-3">
                            <label class="form-label">End</label>
                            <input type="time" name="endTime" class="form-control" required />
                        </div>
                        <div class="col-12 col-md-2 d-flex align-items-end">
                            <button class="btn btn-primary w-100" type="submit">Save</button>
                        </div>
                    </div>
                </form>
            </div>

            <h5 class="mb-2">Your Slots</h5>
            

            <table class="table table-bordered mt-3" th:if="${not #lists.isEmpty(slots)}">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Date</th>
                        <th>Start</th>
                        <th>End</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="slot : ${slots}">
                        <td th:text="${slot.slotId}"></td>
                        <td th:text="${slot.slotDate}"></td>
                        <td th:text="${slot.startTime}"></td>
                        <td th:text="${slot.endTime}"></td>
                        <td th:text="${slot.status}"></td>

                        <td>

                            <!-- AVAILABLE -->
                            <form th:if="${slot.status.name() == 'AVAILABLE'}"
                                th:action="@{/doctor/slots/delete/{id}(id=${slot.slotId})}"
                                method="post">

                                <button type="submit"
                                        class="btn btn-danger btn-sm">
                                    Delete
                                </button>
                            </form>

                            <!-- PENDING -->
                            <a th:if="${slot.status.name() == 'PENDING'}"
                            th:href="@{/doctor/appointments}"
                            class="btn btn-warning btn-sm">
                                Pending
                            </a>

                            <!-- CONFIRMED -->
                            <a th:if="${slot.status.name() == 'CONFIRMED'}"
                            th:href="@{/doctor/appointments}"
                            class="btn btn-primary btn-sm">
                                Confirmed
                            </a>

                            <!-- COMPLETED -->
                            <span th:if="${slot.status.name() == 'COMPLETED'}"
                                class="badge bg-success">
                                Completed
                            </span>

                            <!-- CANCELLED -->
                            <span th:if="${slot.status.name() == 'CANCELLED'}"
                                class="badge bg-danger">
                                Cancelled
                            </span>

                        </td>

                        

                    </tr>
                </tbody>
            </table>

            <div class="alert alert-warning mt-3"
                th:if="${#lists.isEmpty(slots)}">
                No slots found.
            </div>
        </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
