<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>All Appointments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link th:href="@{/static/css/style.css}" rel="stylesheet" />
</head>
<body>
<div class="app-shell">

    <nav class="topbar navbar navbar-expand-lg navbar-light">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" th:href="@{/admin/dashboard}">MediBook</a>
            <div class="ms-auto d-flex gap-2 align-items-center">
                <span class="text-muted small" th:text="${session.userName}"></span>
                <a class="btn btn-outline-danger btn-sm" th:href="@{/logout}">Logout</a>
            </div>
        </div>
    </nav>

    <div class="main-area d-flex">
        <aside class="sidebar">
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/dashboard}">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/users}">Users</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/admin/appointments}">Appointments</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/specializations}">Specializations</a></li>
            </ul>
        </aside>

        <main class="content flex-grow-1 p-4">
            <h3 class="mb-3">All Appointments</h3>

            <form class="row g-2 align-items-end mb-4" th:action="@{/admin/appointments}" method="get">
                <div class="col-12 col-md-4">
                    <label class="form-label">Status</label>
                    <select name="status" class="form-select">
                        <option value="" th:selected="${statusFilter == null}">All</option>
                        <option th:each="s : ${T(com.dabs.model.enums.AppointmentStatus).values()}" th:value="${s}" th:selected="${statusFilter != null and statusFilter == s}" th:text="${s}"></option>
                    </select>
                </div>
                <div class="col-12 col-md-2">
                    <button class="btn btn-primary w-100" type="submit">Filter</button>
                </div>
            </form>

            <div class="table-responsive">
                <table class="table table-hover bg-white shadow-sm" style="border-radius:10px; overflow:hidden;">
                    <thead class="table-light">
                    <tr>
                        <th>Appointment ID</th>
                        <th>Patient</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Status</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(appointments)}">
                        <td colspan="5"><div class="text-muted">No appointments found.</div></td>
                    </tr>
                    <tr th:each="a : ${appointments}">
                        <td th:text="${a.appointmentId}"></td>
                        <td th:text="${a.patient.name}"></td>
                        <td th:text="${a.slot.slotDate}"></td>
                        <td th:text="${a.slot.startTime + ' - ' + a.slot.endTime}"></td>
                        <td>
                            <span class="badge badge-" th:classappend="${'badge-' + a.status}" th:text="${a.status}"></span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </main>
    </div>
</div>
</body>
</html>
