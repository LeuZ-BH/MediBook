<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Manage Specializations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link th:href="@{/static/css/style.css}" rel="stylesheet" />
</head>
<body>
<div class="app-shell">

    <nav class="topbar navbar navbar-expand-lg navbar-light">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" th:href="@{/admin/dashboard}">MediBook</a>
            <div class="ms-auto d-flex gap-2 align-items-center">
                <span class="text-muted small" th:text="${session.userName}"></span>
                <a class="btn btn-outline-danger btn-sm" th:href="@{/logout}">Logout</a>
            </div>
        </div>
    </nav>

    <div class="main-area d-flex">
        <aside class="sidebar">
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/dashboard}">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/users}">Users</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/appointments}">Appointments</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/admin/specializations}">Specializations</a></li>
            </ul>
        </aside>

        <main class="content flex-grow-1 p-4">
            <h3 class="mb-3">Manage Specializations</h3>

            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <div class="card shadow-sm border-0 p-4 mb-4">
                <h5 class="mb-3">Add Specialization</h5>
                <form th:action="@{/admin/specializations/add}" method="post" class="row g-2 align-items-end">
                    <div class="col-12 col-md-5">
                        <label class="form-label">Name</label>
                        <input type="text" name="name" class="form-control" required />
                    </div>
                    <div class="col-12 col-md-5">
                        <label class="form-label">Description</label>
                        <input type="text" name="description" class="form-control" />
                    </div>
                    <div class="col-12 col-md-2">
                        <button type="submit" class="btn btn-primary w-100">Add</button>
                    </div>
                </form>
            </div>

            <div class="table-responsive">
                <table class="table table-hover bg-white shadow-sm" style="border-radius:10px; overflow:hidden;">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Description</th>
                        <th>Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(specializations)}">
                        <td colspan="4"><div class="text-muted">No specializations found.</div></td>
                    </tr>
                    <tr th:each="s : ${specializations}">
                        <td th:text="${s.specId}"></td>
                        <td th:text="${s.name}"></td>
                        <td th:text="${s.description}"></td>
                        <td>
                            <form th:action="@{/admin/specializations/delete/{id}(id=${s.specId})}" method="post" onsubmit="return confirm('Delete specialization?');">
                                <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </main>
    </div>
</div>
</body>
</html>
