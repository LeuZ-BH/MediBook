<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header">
            <h2>Edit Doctor Profile</h2>
        </div>

        <div class="card-body">

            <form th:action="@{/doctor/profile/update}"
                  th:object="${doctor}"
                  method="post">

                <input type="hidden" th:field="*{doctorId}">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label>Qualification</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{qualification}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Experience</label>
                        <input type="number"
                               class="form-control"
                               th:field="*{experienceYears}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Consultation Fee</label>
                        <input type="number"
                               class="form-control"
                               th:field="*{consultationFee}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Hospital Name</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{hospitalName}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>City</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{city}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>State</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{state}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Country</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{country}">
                    </div>

                    <div class="col-12 mb-3">
                        <label>Address</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{addressLine}">
                    </div>

                    <div class="col-12 mb-3">
                        <label>Bio</label>
                        <textarea class="form-control"
                                  rows="4"
                                  th:field="*{bio}"></textarea>
                    </div>

                </div>

                <button type="submit"
                        class="btn btn-primary">
                    Save Changes
                </button>

                <a th:href="@{/doctor/dashboard}"
                   class="btn btn-secondary">
                    Cancel
                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
