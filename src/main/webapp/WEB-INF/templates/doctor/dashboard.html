<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Doctor Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link th:href="@{/static/css/style.css}" rel="stylesheet" />
</head>
<body>
<div class="app-shell">

    <nav class="topbar navbar navbar-expand-lg navbar-light">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" th:href="@{/doctor/dashboard}">MediBook</a>
            <div class="ms-auto d-flex gap-2 align-items-center">
                <span class="text-muted small" th:text="${session.userName}"></span>
                <a class="btn btn-outline-danger btn-sm" th:href="@{/logout}">Logout</a>
            </div>
        </div>
    </nav>

    <div class="main-area d-flex">
        <aside class="sidebar">
            <ul class="nav flex-column">

                <li class="nav-item">
                    <a class="nav-link"
                    th:classappend="${activePage == 'dashboard'} ? ' active' : ''"
                    th:href="@{/doctor/dashboard}">
                        Dashboard
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                    th:classappend="${activePage == 'slots'} ? ' active' : ''"
                    th:href="@{/doctor/slots}">
                        Manage Slots
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                    th:classappend="${activePage == 'appointments'} ? ' active' : ''"
                    th:href="@{/doctor/appointments}">
                        My Appointments
                    </a>
                </li>

            </ul>
        </aside>

        <main class="content flex-grow-1 p-4">
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

            <h3 class="mb-3">Doctor Dashboard</h3>
            <h4 th:text="${activePage}">TEST</h4>

            <div class="row g-3">
                <div class="col-12 col-md-4">
                    <div class="stat-card">
                        <div class="stat-label">Total Slots</div>
                        <div class="stat-value" th:text="${totalSlots}"></div>
                    </div>
                </div>
                <div class="col-12 col-md-4">
                    <div class="stat-card">
                        <div class="stat-label">Booked Slots</div>
                        <div class="stat-value" th:text="${bookedSlots}"></div>
                    </div>
                </div>
                <div class="col-12 col-md-4">
                    <div class="stat-card">
                        <div class="stat-label">Available Slots</div>
                        <div class="stat-value" th:text="${availableSlots}"></div>
                    </div>
                </div>
            </div>

            <div class="mt-4">
                <h5 class="mb-2">Today's Appointments</h5>
                <div class="alert alert-info">Appointment list is shown on the My Appointments page.</div>
                <a th:href="@{/doctor/appointments}" class="btn btn-primary">Go to appointments</a>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
